<!doctype html>
<html lang="zh-CN" data-accent="ikb">
<head>
  <meta charset="utf-8">
  <title>Swiss International · Cover Design Seed</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Noto+Sans+SC:wght@200;300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    /* =========================================================
       Swiss International — Cover Design Seed Template
       ---------------------------------------------------------

       Accent switching via <html data-accent="…">:
         ikb | lemon-yellow | lemon-green | safety-orange | custom

       [data-accent="custom"] reads user CSS variables:
         --user-paper / --user-ink / --user-grey-1 / --user-grey-2
         --user-grey-3 / --user-accent / --user-accent-on

       Poster sizes (section.poster):
         .xhs    1080 × 1440    (3:4   小红书)
         .square 1080 × 1080    (1:1   微信方封面)
         .wide   2100 ×  900    (21:9  微信主封面)
         .custom via CSS variables --canvas-w / --canvas-h

       Fill posters where marked <!-- POSTERS_HERE -->.
       ========================================================= */

    /* =========================================================
       1. Accent palettes
       ========================================================= */
    :root,
    [data-accent="ikb"] {
      --paper: #fafaf8;
      --ink: #0a0a0a;
      --grey-1: #f0f0ee;
      --grey-2: #d4d4d2;
      --grey-3: #737373;
      --accent: #002FA7;
      --accent-on: #ffffff;
    }
    [data-accent="lemon-yellow"] {
      --paper: #fafaf8;
      --ink: #0a0a0a;
      --grey-1: #f0f0ee;
      --grey-2: #d4d4d2;
      --grey-3: #737373;
      --accent: #FFD500;
      --accent-on: #0a0a0a;
    }
    [data-accent="lemon-green"] {
      --paper: #fafaf8;
      --ink: #0a0a0a;
      --grey-1: #f0f0ee;
      --grey-2: #d4d4d2;
      --grey-3: #737373;
      --accent: #C5E803;
      --accent-on: #0a0a0a;
    }
    [data-accent="safety-orange"] {
      --paper: #fafaf8;
      --ink: #0a0a0a;
      --grey-1: #f0f0ee;
      --grey-2: #d4d4d2;
      --grey-3: #737373;
      --accent: #FF6B35;
      --accent-on: #ffffff;
    }
    /*
       Custom accent — user sets CSS variables on any ancestor.
       Example: <html data-accent="custom" style="--user-accent:#E91E63;--user-accent-on:#fff">
    */
    [data-accent="custom"] {
      --paper: var(--user-paper, #fafaf8);
      --ink: var(--user-ink, #0a0a0a);
      --grey-1: var(--user-grey-1, #f0f0ee);
      --grey-2: var(--user-grey-2, #d4d4d2);
      --grey-3: var(--user-grey-3, #737373);
      --accent: var(--user-accent, #002FA7);
      --accent-on: var(--user-accent-on, #ffffff);
    }

    /* =========================================================
       2. Typography stack
       ========================================================= */
    :root {
      --sans:    "Inter", "Helvetica Neue", Helvetica, "Noto Sans SC",
                 -apple-system, "PingFang SC", "Microsoft YaHei UI", sans-serif;
      --sans-zh: "Noto Sans SC", -apple-system, "PingFang SC",
                 "Microsoft YaHei UI", "Inter", sans-serif;
      --mono:    "IBM Plex Mono", ui-monospace, "SF Mono", Consolas, monospace;
    }

    /* =========================================================
       3. Spacing tokens
       ========================================================= */
    :root {
      --sp-3:   8px;
      --sp-4:  12px;
      --sp-5:  16px;
      --sp-6:  24px;
      --sp-7:  32px;
      --sp-8:  40px;
      --sp-9:  48px;
      --sp-10: 64px;
      --sp-11: 80px;
      --sp-12: 96px;
      --sp-13:160px;
    }

    /* =========================================================
       4. Reset & sheet
       ========================================================= */
    *,*::before,*::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      font-family: var(--sans);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding: 64px 32px;
    }
    .sheet {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    /* =========================================================
       5. Poster boards
       ========================================================= */
    .poster {
      position: relative;
      background: var(--paper);
      color: var(--ink);
      overflow: hidden;
      isolation: isolate;
    }
    .poster.xhs     { width: 1080px; height: 1440px; }
    .poster.square  { width: 1080px; height: 1080px; }
    .poster.wide    { width: 2100px; height:  900px; }

    /* Custom canvas size — driven by CSS variables */
    .poster.custom {
      width: var(--canvas-w, 1080px);
      height: var(--canvas-h, 1080px);
      min-width: 400px;
      min-height: 400px;
    }

    .poster figure { margin: 0; }

    /* Content padding per poster size */
    .poster.xhs     .content { padding: var(--sp-12) var(--sp-11); }
    .poster.square  .content { padding: var(--sp-11) var(--sp-11); }
    .poster.wide    .content { padding: var(--sp-11) var(--sp-13); }
    .poster.custom  .content { padding: var(--sp-11) var(--sp-11); }

    .content {
      position: relative;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    /* =========================================================
       6. Decorative layers (opt-in per poster)
       ========================================================= */
    .dot-mat,
    .ring-mat,
    .cross-mat {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .dot-mat {
      opacity: .08;
      background-image: radial-gradient(var(--ink) 1.5px, transparent 1.5px);
      background-size: 24px 24px;
    }
    .ring-mat {
      opacity: .08;
      background-image: radial-gradient(
        circle at 50% 50%,
        transparent 4px,
        var(--ink) 4.5px,
        var(--ink) 5px,
        transparent 5.5px
      );
      background-size: 32px 32px;
    }
    .cross-mat {
      opacity: .06;
      background-image:
        linear-gradient(var(--ink), var(--ink)),
        linear-gradient(90deg, var(--ink), var(--ink));
      background-size: 1px 14px, 14px 1px;
      background-position: center, center;
      background-repeat: repeat;
    }

    /* =========================================================
       7. Typography roles
       ---------------------------------------------------------
       Hard rule: "the larger, the lighter"
         ≥ 200px           → weight 200 (ExtraLight)
         Smaller text      → weight 400–500
         Labels & metadata → weight 500–600
       ========================================================= */
    .h-hero {
      font-family: var(--sans);
      font-weight: 200;
      font-size: 240px;
      line-height: 1.02;
      letter-spacing: -.02em;
      margin: 0;
      color: var(--ink);
    }
    .h-statement {
      font-family: var(--sans);
      font-weight: 200;
      font-size: 180px;
      line-height: 1.05;
      letter-spacing: -.015em;
      margin: 0;
      color: var(--ink);
    }
    .h-xl {
      font-family: var(--sans);
      font-weight: 300;
      font-size: 120px;
      line-height: 1.08;
      letter-spacing: -.01em;
      margin: 0;
      color: var(--ink);
    }
    .h-md {
      font-family: var(--sans);
      font-weight: 400;
      font-size: 56px;
      line-height: 1.18;
      margin: 0;
      color: var(--ink);
    }
    .lead {
      font-family: var(--sans-zh);
      font-weight: 400;
      font-size: 30px;
      line-height: 1.55;
      color: var(--ink);
      margin: 0;
    }
    .body {
      font-family: var(--sans-zh);
      font-weight: 400;
      font-size: 26px;
      line-height: 1.6;
      color: var(--ink);
      margin: 0;
    }
    .label {
      font-family: var(--sans);
      font-weight: 600;
      font-size: 22px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent);
      margin: 0;
    }
    .meta {
      font-family: var(--mono);
      font-weight: 500;
      font-size: 20px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--grey-3);
      margin: 0;
    }
    .mono { font-family: var(--mono); }

    /* =========================================================
       8. Typography size overrides per poster size
       ---------------------------------------------------------
       Base sizes (above) = widest canvas. Smaller formats
       step down to stay legible within their vertical budget.
       ========================================================= */

    /* XHS (3:4) — tightest vertical budget */
    .poster.xhs .h-hero      { font-size: 168px; }
    .poster.xhs .h-statement { font-size: 124px; }
    .poster.xhs .h-xl        { font-size:  96px; }
    .poster.xhs .h-md        { font-size:  48px; }

    /* Square (1:1) — moderate */
    .poster.square .h-hero       { font-size: 180px; }
    .poster.square .h-statement  { font-size: 140px; }
    .poster.square .h-xl         { font-size:  88px; }
    .poster.square .h-md         { font-size:  48px; }

    /* Wide (21:9) — maximal horizontal real estate */
    .poster.wide .h-hero      { font-size: 200px; }
    .poster.wide .h-statement { font-size: 156px; }
    .poster.wide .h-xl        { font-size: 104px; }
    .poster.wide .h-md        { font-size:  56px; }

    /* Custom — inherits base sizes; no override */

    /* =========================================================
       9. Layout primitives
       ========================================================= */
    .stack    { display: flex; flex-direction: column; }
    .row      { display: flex; flex-direction: row; }

    /* Gap scale: 1=8px .. 5=32px */
    .gap-1    { gap: var(--sp-3); }
    .gap-2    { gap: var(--sp-4); }
    .gap-3    { gap: var(--sp-5); }
    .gap-4    { gap: var(--sp-6); }
    .gap-5    { gap: var(--sp-7); }

    /* Column grids */
    .col-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-7);
    }
    .col-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--sp-7);
    }

    .center   { text-align: center; }
    .right    { text-align: right; }
    .grow     { flex: 1; }

    /* Rules */
    .rule {
      height: 1px;
      background: var(--grey-2);
      border: 0;
      margin: 0;
    }
    .rule-accent {
      height: 3px;
      background: var(--accent);
      border: 0;
      width: 96px;
      margin: 0;
    }

    /* =========================================================
       10. Card fills
       ========================================================= */
    .card-fill {
      background: var(--grey-1);
      color: var(--ink);
      padding: var(--sp-8);
    }
    /* Accent variant — solid accent background */
    .card-fill.accent {
      background: var(--accent);
      color: var(--accent-on);
    }
    .card-fill.accent .label,
    .card-fill.accent .meta,
    .card-fill.accent .lead,
    .card-fill.accent .body,
    .card-fill.accent .h-md { color: var(--accent-on); }

    /* =========================================================
       11. Image containers
       ========================================================= */

    /* .frame-img — general image holder */
    .frame-img {
      position: relative;
      overflow: hidden;
      background: var(--grey-1);
      display: block;
      margin: 0;
    }
    .frame-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 35%;
      display: block;
    }
    .frame-img.fit-contain img {
      object-fit: contain;
      background: var(--paper);
    }
    .frame-img.r-3x4   { aspect-ratio: 3 / 4; }
    .frame-img.r-1x1   { aspect-ratio: 1 / 1; }
    .frame-img.r-4x3   { aspect-ratio: 4 / 3; }
    .frame-img.r-16x9  { aspect-ratio: 16 / 9; }
    .frame-img.r-16x10 { aspect-ratio: 16 / 10; }
    .frame-img.r-21x9  { aspect-ratio: 21 / 9; }

    .img-caption {
      font-family: var(--mono);
      font-weight: 500;
      font-size: 18px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--grey-3);
      margin-top: var(--sp-5);
    }

    /* .frame-shot — screenshot / UI capture container */
    .frame-shot {
      position: relative;
      overflow: hidden;
      display: block;
      margin: 0;
      background: var(--grey-1);
      border-radius: 0;
    }
    .frame-shot.corners-sq { border-radius: 0; }
    .frame-shot.corners-sm { border-radius: 4px; }
    .frame-shot.corners-md { border-radius: 10px; }

    .frame-shot.shadow-soft {
      box-shadow: 0 12px 28px -16px rgba(0,0,0,.18);
    }
    .frame-shot.shadow-ed {
      box-shadow: 0 20px 40px -20px rgba(0,0,0,.22), 0 0 0 1px var(--grey-2);
    }

    /* Background tones */
    .frame-shot.bg-paper   { background: var(--paper); }
    .frame-shot.bg-grey-1  { background: var(--grey-1); }
    .frame-shot.bg-ink     { background: var(--ink); }
    .frame-shot.bg-grid {
      background-color: var(--paper);
      background-image:
        linear-gradient(to right, var(--grey-2) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grey-2) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .frame-shot.bg-dot {
      background-color: var(--paper);
      background-image: radial-gradient(var(--grey-2) 1px, transparent 1px);
      background-size: 18px 18px;
    }

    /* Inset padding for screenshot interior */
    .frame-shot.inset-none > img,
    .frame-shot.inset-none > .shot-body { padding: 0; }
    .frame-shot.inset-sub  { padding: 20px; }
    .frame-shot.inset-bal  { padding: 48px; }

    /* Ratio classes */
    .frame-shot.r-3x4   { aspect-ratio: 3 / 4; }
    .frame-shot.r-1x1   { aspect-ratio: 1 / 1; }
    .frame-shot.r-4x3   { aspect-ratio: 4 / 3; }
    .frame-shot.r-16x9  { aspect-ratio: 16 / 9; }
    .frame-shot.r-16x10 { aspect-ratio: 16 / 10; }
    .frame-shot.r-21x9  { aspect-ratio: 21 / 9; }
    .frame-shot.r-3x2   { aspect-ratio: 3 / 2; }

    .frame-shot > img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      border-radius: inherit;
    }
    .frame-shot.fit-cover > img { object-fit: cover; }

    /* =========================================================
       12. Swiss components
       ========================================================= */

    /* --- KPI Tower ---
       Row of stat columns. Each column has a numeric value,
       a proportional accent bar, and a label.                  */
    .kpi-tower {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--sp-7);
      align-items: end;
    }
    .kpi-tower .tower-col {
      display: flex;
      flex-direction: column;
      gap: var(--sp-5);
      align-items: flex-start;
    }
    .kpi-tower .tower-col .num {
      font-family: var(--sans);
      font-weight: 200;
      font-size: 112px;
      line-height: 1;
      letter-spacing: -.02em;
      margin: 0;
      color: var(--ink);
    }
    .kpi-tower .tower-col .bar {
      width: 100%;
      height: var(--bar-h, 200px);
      background: var(--accent);
      transform-origin: bottom;
    }
    .kpi-tower .tower-col .lbl {
      font-family: var(--mono);
      font-size: 20px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--grey-3);
      margin: 0;
    }
    /* Muted column — use grey accent bar */
    .kpi-tower .tower-col.muted .bar { background: var(--grey-2); }

    /* --- H-Bar ---
       Horizontal bar chart. Label → track → value.             */
    .h-bar {
      display: flex;
      flex-direction: column;
      gap: var(--sp-6);
    }
    .h-bar .bar-row {
      display: grid;
      grid-template-columns: 200px 1fr 100px;
      gap: var(--sp-6);
      align-items: center;
    }
    .h-bar .bar-row .row-lbl {
      font-family: var(--sans-zh);
      font-weight: 500;
      font-size: 26px;
      line-height: 1.3;
      color: var(--ink);
    }
    .h-bar .bar-row .row-track {
      position: relative;
      height: 28px;
      background: var(--grey-1);
    }
    .h-bar .bar-row .row-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: var(--bar-w, 50%);
      background: var(--accent);
    }
    .h-bar .bar-row .row-val {
      font-family: var(--mono);
      font-weight: 500;
      font-size: 26px;
      letter-spacing: .04em;
      text-align: right;
      color: var(--ink);
    }

    /* --- Matrix ---
       4-column grid of uniform cells, each with a number
       and title. One cell can carry .accent to highlight.     */
    .matrix {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: 1fr;
      gap: var(--sp-5);
    }
    .matrix .cell {
      background: var(--grey-1);
      padding: var(--sp-7);
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
      min-height: 140px;
    }
    .matrix .cell .nb {
      font-family: var(--mono);
      font-size: 18px;
      letter-spacing: .12em;
      color: var(--grey-3);
    }
    .matrix .cell .title {
      font-family: var(--sans-zh);
      font-weight: 500;
      font-size: 26px;
      line-height: 1.3;
      color: var(--ink);
    }
    .matrix .cell.accent {
      background: var(--accent);
      color: var(--accent-on);
    }
    .matrix .cell.accent .nb,
    .matrix .cell.accent .title { color: var(--accent-on); }

    /* --- Process Flow ---
       Horizontal step sequence. Steps separated by vertical
       hairline dividers. Each step has an accent number,
       a title, and an optional description.                    */
    .process-flow {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 0;
    }
    .process-flow .step {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
      padding: 0 var(--sp-7);
      position: relative;
    }
    .process-flow .step:first-child { padding-left: 0; }
    .process-flow .step:last-child  { padding-right: 0; }
    /* Vertical divider between steps */
    .process-flow .step::after {
      content: '';
      position: absolute;
      right: 0;
      top: 14px;
      width: 1px;
      height: 48px;
      background: var(--grey-2);
    }
    .process-flow .step:last-child::after { display: none; }
    .process-flow .step .step-nb {
      font-family: var(--mono);
      font-weight: 500;
      font-size: 20px;
      letter-spacing: .12em;
      color: var(--accent);
    }
    .process-flow .step .step-title {
      font-family: var(--sans-zh);
      font-weight: 500;
      font-size: 26px;
      line-height: 1.3;
      color: var(--ink);
    }
    .process-flow .step .step-desc {
      font-family: var(--sans-zh);
      font-weight: 400;
      font-size: 20px;
      line-height: 1.5;
      color: var(--grey-3);
    }

    /* --- Icon Grid ---
       4-column grid of icon+label pairs. Icons use Lucide
       (data-lucide attribute). Neutral grey-1 cell fill.      */
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--sp-7);
    }
    .icon-grid .icon-cell {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: var(--sp-5);
      padding: var(--sp-7);
      background: var(--grey-1);
    }
    .icon-grid .icon-cell svg {
      width: 44px;
      height: 44px;
      color: var(--accent);
      stroke-width: 1.5;
    }
    .icon-grid .icon-cell .icon-lbl {
      font-family: var(--sans-zh);
      font-weight: 500;
      font-size: 22px;
      line-height: 1.3;
      color: var(--ink);
    }
    .icon-grid .icon-cell .icon-sub {
      font-family: var(--mono);
      font-size: 16px;
      letter-spacing: .08em;
      color: var(--grey-3);
    }

    /* =========================================================
       13. Component size overrides per poster size
       ========================================================= */

    /* XHS — collapse to 2 cols, tighten spacing */
    .poster.xhs .kpi-tower    { grid-template-columns: 1fr 1fr; gap: var(--sp-9); }
    .poster.xhs .kpi-tower .tower-col .num { font-size: 88px; }

    .poster.xhs .h-bar .bar-row {
      grid-template-columns: 1fr;
      gap: var(--sp-4);
    }
    .poster.xhs .h-bar .bar-row .row-val { text-align: left; }

    .poster.xhs .matrix {
      grid-template-columns: repeat(2, 1fr);
      grid-auto-rows: min-content;
      gap: var(--sp-4);
    }
    .poster.xhs .matrix .cell { min-height: 0; padding: var(--sp-5); }
    .poster.xhs .matrix .cell .title { font-size: 24px; }

    .poster.xhs .process-flow { flex-direction: column; gap: var(--sp-6); }
    .poster.xhs .process-flow .step::after { display: none; }
    .poster.xhs .process-flow .step { padding: 0; }

    .poster.xhs .icon-grid { grid-template-columns: repeat(2, 1fr); gap: var(--sp-5); }

    /* Square — moderate collapse */
    .poster.square .kpi-tower    { grid-template-columns: 1fr 1fr; gap: var(--sp-9); }
    .poster.square .kpi-tower .tower-col .num { font-size: 96px; }

    .poster.square .matrix {
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: auto;
    }
    .poster.square .matrix .cell { min-height: 0; }

    .poster.square .icon-grid { grid-template-columns: repeat(3, 1fr); }

    /* Wide — inherits base 4-column layouts; no override */

    /* Custom — inherits base layouts; no override */
  </style>
</head>
<body>
  <!--
    ACCENT OVERRIDE
    Change <html data-accent="…"> to:
    ikb | lemon-yellow | lemon-green | safety-orange | custom

    For [data-accent="custom"], set user CSS variables on <html>:
    <html data-accent="custom" style="--user-accent:#E91E63;--user-accent-on:#fff">

    For custom poster size, set canvas variables:
    <html style="--canvas-w:1920px;--canvas-h:1080px">

    Hard rules every poster must honor:
      - Exactly one accent colour across the entire deck
      - No border-radius, no box-shadow, no gradients
      - "The larger, the lighter": ≥ 200px must use weight 200
      - Strict left-aligned grid, hairline rules only
  -->
  <main class="sheet">

    <!-- POSTERS_HERE -->
    <!--
      Replace the placeholder poster below with real content.
      Available poster sizes:
        <section class="poster xhs"    >…</section>    3:4
        <section class="poster square" >…</section>    1:1
        <section class="poster wide"   >…</section>   21:9
        <section class="poster custom" >…</section>   user-defined

      Component classes:
        Typography: .h-hero  .h-statement  .h-xl  .h-md  .lead  .body  .label  .meta
        Layout:     .stack  .gap-1..5  .row  .col-2  .col-3  .center  .grow  .rule  .rule-accent
        Cards:      .card-fill  .card-fill.accent
        Images:     .frame-img  .frame-shot  (.r-3x4 .r-1x1 .r-4x3 .r-16x9 .r-16x10 .r-21x9)
        Components: .kpi-tower  .h-bar  .matrix  .process-flow  .icon-grid
        Decor:      .dot-mat  .ring-mat  .cross-mat
    -->

    <!-- Placeholder poster — replace with your content -->
    <section class="poster xhs" id="placeholder">
      <div class="content stack gap-5">
        <p class="label">Cover Design · Seed</p>
        <h1 class="h-statement">Swiss<br>International</h1>
        <div class="grow"></div>
        <hr class="rule-accent">
        <p class="lead">
          Replace this placeholder with your own cover content.
          Choose a poster size and accent theme above.
        </p>
        <div class="row gap-4">
          <p class="meta">NBDE · Template</p>
          <p class="meta">/ Seed v1</p>
        </div>
      </div>
    </section>

  </main>

  <!-- Lucide icon initialization -->
  <script>
